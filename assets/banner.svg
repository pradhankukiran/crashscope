<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="0.5" stop-color="#f97316"/>
      <stop offset="1" stop-color="#ea580c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.2" r="0.6">
      <stop offset="0" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#glow)"/>

  <!-- Subtle grid for depth -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
  </g>

  <!-- Mark: magnifying glass -->
  <g transform="translate(80, 110)">
    <rect width="140" height="140" rx="30" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
    <g transform="translate(28, 28)">
      <circle cx="36" cy="36" r="28" fill="none" stroke="white" stroke-width="7"/>
      <line x1="56" y1="56" x2="78" y2="78" stroke="white" stroke-width="8" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Wordmark + tagline -->
  <text x="260" y="190" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="84" font-weight="700" fill="white" letter-spacing="-2">
    crashscope
  </text>
  <text x="262" y="240" font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="24" font-weight="500" fill="rgba(255,255,255,0.92)">
    AI-powered error triage for your stack
  </text>
  <text x="262" y="278" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="15" font-weight="400" fill="rgba(255,255,255,0.7)">
    sentry · rollbar · bugsnag · honeybadger  ▸  posthog · logrocket  ▸  claude
  </text>
</svg>
